name: Monitor Diário Oficial

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  monitorar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium via apt
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Instalar Playwright (sem deps do sistema)
        run: playwright install chromium --with-deps || playwright install-deps || true

      - name: Rodar monitor
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          MOVIMENTACOES_DB_ID: ${{ secrets.MOVIMENTACOES_DB_ID }}
          PLAYWRIGHT_BROWSERS_PATH: /usr/bin
        run: python monitor_dom.py
