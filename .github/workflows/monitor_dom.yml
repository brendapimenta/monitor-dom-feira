name: Monitor Diário Oficial

on:
  schedule:
    # Roda de segunda a sexta às 9h horário de Brasília (12:00 UTC)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    # Permite rodar manualmente pelo site do GitHub (botão "Run workflow")

jobs:
  monitorar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Rodar monitor
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          MOVIMENTACOES_DB_ID: ${{ secrets.MOVIMENTACOES_DB_ID }}
        run: python monitor_dom.py
