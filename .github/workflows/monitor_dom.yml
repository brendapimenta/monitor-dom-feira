name: Monitor Diário Oficial

on:
  schedule:
    # 8h Brasília = 11h UTC | 12h Brasília = 15h UTC — seg a sex
    - cron: "0 11 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch:  # permite rodar manualmente

jobs:
  monitorar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install requests pypdf playwright

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Restaurar cache do DOM (evita duplicatas)
        uses: actions/cache@v4
        with:
          path: dom_cache.json
          key: dom-cache-${{ github.run_id }}
          restore-keys: |
            dom-cache-

      - name: Executar monitor
        env:
          NOTION_TOKEN:    ${{ secrets.NOTION_TOKEN }}
          MONITOR_DOM_DB_ID: ${{ secrets.MONITOR_DOM_DB_ID }}
          NTFY_URL:        ${{ secrets.NTFY_URL }}
        run: python monitor_dom.py

      - name: Salvar cache atualizado
        if: always()
        uses: actions/cache/save@v4
        with:
          path: dom_cache.json
          key: dom-cache-${{ github.run_id }}
